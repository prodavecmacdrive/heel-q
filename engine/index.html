<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Heel Journey</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      canvas {
        /* Crucial for retro look — hard pixel edges on upscale */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        /* Positioned absolutely; size/position managed by PixelRenderer */
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
